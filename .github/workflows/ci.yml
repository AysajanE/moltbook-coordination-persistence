name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gate-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pandas pyarrow

      - name: Run repository gates
        run: make gate

      - name: Run unit tests
        run: make test
